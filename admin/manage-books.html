<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Hub | Admin Panel</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body data-page="admin">
  <header class="site-header">
    <a href="../index.html" class="brand-link" aria-label="Book Hub home page">
      <span class="brand-name">Book Hub</span>
    </a>

    <nav class="site-nav" aria-label="Main navigation">
      <a href="../index.html">Home</a>
      <a href="../search.html">Search</a>
       <a href="../contact.html">Contact</a>
      <a href="manage-books.html" aria-current="page">Manage Books</a>
      <a href="../login.html" class="button-link" data-auth-link="logout">Log Out</a>
    </nav>
  </header>

  <main class="page-shell">
    

    <section class="admin-layout">
      <section class="info-card admin-form-card">
        <p class="eyebrow">Create / Update</p>
        <h2>Book Information</h2>

        <form id="adminBookForm" class="stacked-form" novalidate>
          <input type="hidden" name="bookId">

          <label class="field">
            <span>Title</span>
            <input type="text" name="title" required placeholder="Book title">
            <small class="error-text"></small>
          </label>

          <label class="field">
            <span>Author</span>
            <input type="text" name="author" required placeholder="Author name">
            <small class="error-text"></small>
          </label>

          <label class="field">
            <span>Category</span>
            <input type="text" name="category" required placeholder="Category">
            <small class="error-text"></small>
          </label>

          <label class="field">
            <span>ISBN</span>
            <input type="text" name="isbn" required placeholder="ISBN number">
            <small class="error-text"></small>
          </label>

          <label class="field">
            <span>Description</span>
            <textarea name="description" rows="4" required placeholder="Short description"></textarea>
            <small class="error-text"></small>
          </label>

          <div class="inline-actions">
            <button type="submit" class="primary-btn">Save Book</button>
            <button id="adminResetButton" type="button" class="ghost-btn">Clear</button>
          </div>
        </form>

        <p id="adminMessage" class="status-message"></p>
      </section>

      <article class="info-card admin-overdue-card">
        <p class="eyebrow">Overdue Items</p>
        <h2>Late Returns</h2>
        <div id="overdueCards" class="card-stack"></div>
      </article>
    </section>

    <section class="section-shell table-shell admin-table-card">
      <div class="section-heading">
        <p class="eyebrow">Book Inventory</p>
        <h2>Manage Existing Books</h2>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Author</th>
              <th>Category</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="adminBookTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <p>&copy; 2026 Book Hub | All Rights Reserved</p>
  </footer>

  <script src="../assets/js/app.js"></script>
</body>

</html>
